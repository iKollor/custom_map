services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_MAP_STYLE: ${NEXT_PUBLIC_MAP_STYLE:-https://tiles.openfreemap.org/styles/liberty}
        NEXT_PUBLIC_MAP_STYLE_DARK: ${NEXT_PUBLIC_MAP_STYLE_DARK:-}
        NEXT_PUBLIC_DEFAULT_CENTER_LAT: ${NEXT_PUBLIC_DEFAULT_CENTER_LAT:--2.1894}
        NEXT_PUBLIC_DEFAULT_CENTER_LNG: ${NEXT_PUBLIC_DEFAULT_CENTER_LNG:--79.8891}
        NEXT_PUBLIC_DEFAULT_ZOOM: ${NEXT_PUBLIC_DEFAULT_ZOOM:-12}
    container_name: map-platform-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-mapuser}:${POSTGRES_PASSWORD:-map_dev}@postgres:5432/${POSTGRES_DB:-mapdb}
      AUTH_USERNAME: ${AUTH_USERNAME:-admin}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-mapa2025}
      AUTH_SESSION_TOKEN: ${AUTH_SESSION_TOKEN:-dev-token-change-me}
      OSRM_URL: ${OSRM_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"

  # PostgreSQL with PostGIS extension
  postgres:
    image: kartoza/postgis:16-3.4
    container_name: map-platform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mapuser}
      POSTGRES_PASS: ${POSTGRES_PASSWORD:-map_dev}
      POSTGRES_DBNAME: ${POSTGRES_DB:-mapdb}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgre/init-postgis.sql:/docker-entrypoint-initdb.d/init-postgis.sql:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-mapuser} -d ${POSTGRES_DB:-mapdb}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
