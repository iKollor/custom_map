services:
  # PostgreSQL with PostGIS extension
  postgres:
    image: nickblah/postgis:17-bookworm-postgis-3.6
    container_name: map-platform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mapuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-map_dev}
      POSTGRES_DB: ${POSTGRES_DB:-mapdb}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-postgis.sql:/docker-entrypoint-initdb.d/init-postgis.sql:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-mapuser} -d ${POSTGRES_DB:-mapdb}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
